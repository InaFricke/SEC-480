---
- hosts: ubuntu
  become: yes
  gather_facts: no

  tasks:
    - name: Add deployer user
      user:
        name: deployer
        state: present

    - name: Add public key for deployer
      authorized_key:
        user: deployer
        key: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"

    - name: Create sudoers drop-in for deployer
      copy:
        dest: /etc/sudoers.d/deployer
        content: "deployer ALL=(ALL) NOPASSWD:ALL\n"
        mode: '0440'

    - name: Set hostname
      hostname:
        name: "{{ inventory_hostname }}"

    - name: Configure static IP with netplan
      template:
        src: netplan.j2
        dest: /etc/netplan/00-installer-config.yaml
        mode: '0600'
      notify: reboot

  handlers:
    - name: reboot
      shell: sleep 3 && reboot
      async: 1
      poll: 0
